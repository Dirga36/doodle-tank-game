
<style>
canvas { display: block; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-tertiary); background: #1a2a1a; }
.ctrl-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-size: 13px; color: var(--color-text-secondary); }
.ctrl-row label { min-width: 130px; }
.ctrl-row span { min-width: 36px; text-align: right; font-variant-numeric: tabular-nums; color: var(--color-text-primary); }
.legend { display: flex; gap: 20px; font-size: 12px; color: var(--color-text-secondary); margin-bottom: 10px; }
.leg-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 4px; vertical-align: middle; }
</style>

<h2 class="sr-only">Interactive tank controls demo — move with WASD, turret follows mouse</h2>

<div class="legend">
  <span><span class="leg-dot" style="background:#7ec850"></span>Hull</span>
  <span><span class="leg-dot" style="background:#e0c060"></span>Turret</span>
  <span><span class="leg-dot" style="background:#e05050"></span>Aim direction</span>
</div>

<canvas id="tc" width="680" height="320"></canvas>

<div style="margin-top: 14px;">
  <div class="ctrl-row">
    <label>Move speed</label>
    <input type="range" min="40" max="220" value="120" step="1" id="spd" style="flex:1">
    <span id="spd-v">120</span>
  </div>
  <div class="ctrl-row">
    <label>Turn speed (°/s)</label>
    <input type="range" min="30" max="200" value="90" step="1" id="trn" style="flex:1">
    <span id="trn-v">90</span>
  </div>
  <div class="ctrl-row">
    <label>Turret track speed</label>
    <input type="range" min="1" max="20" value="8" step="1" id="tsp" style="flex:1">
    <span id="tsp-v">8</span>
  </div>
</div>

<div style="margin-top: 10px; font-size: 12px; color: var(--color-text-tertiary);">
  WASD to drive · mouse to aim · click canvas to lock pointer
</div>

<script>
const canvas = document.getElementById('tc');
const ctx = canvas.getContext('2d');

const W = canvas.width, H = canvas.height;
const keys = {};
let mouseX = W/2, mouseY = H/2;
let ptrLocked = false;

const tank = {
  x: W/2, y: H/2,
  angle: -Math.PI/2,
  turretAngle: -Math.PI/2,
  speed: 120,
  turnSpeed: 90 * Math.PI / 180,
  turretSpeed: 8,
  trail: []
};

document.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; e.preventDefault && ['w','a','s','d'].includes(e.key.toLowerCase()) && e.preventDefault(); });
document.addEventListener('keyup',   e => { keys[e.key.toLowerCase()] = false; });

canvas.addEventListener('click', () => {
  if (!ptrLocked) canvas.requestPointerLock?.();
});
document.addEventListener('pointerlockchange', () => {
  ptrLocked = document.pointerLockElement === canvas;
});
document.addEventListener('mousemove', e => {
  if (ptrLocked) {
    mouseX = Math.max(0, Math.min(W, mouseX + e.movementX));
    mouseY = Math.max(0, Math.min(H, mouseY + e.movementY));
  } else {
    const r = canvas.getBoundingClientRect();
    const scaleX = W / r.width;
    const scaleY = H / r.height;
    mouseX = (e.clientX - r.left) * scaleX;
    mouseY = (e.clientY - r.top) * scaleY;
  }
});

document.getElementById('spd').oninput = function() { tank.speed = +this.value; document.getElementById('spd-v').textContent = this.value; };
document.getElementById('trn').oninput = function() { tank.turnSpeed = +this.value * Math.PI / 180; document.getElementById('trn-v').textContent = this.value; };
document.getElementById('tsp').oninput = function() { tank.turretSpeed = +this.value; document.getElementById('tsp-v').textContent = this.value; };

let last = performance.now();

function drawTank(x, y, hullAngle, turretAngle) {
  ctx.save();
  ctx.translate(x, y);

  ctx.save();
  ctx.rotate(hullAngle);
  ctx.fillStyle = '#4a6a3a';
  ctx.strokeStyle = '#7ec850';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.roundRect(-22, -14, 44, 28, 4);
  ctx.fill(); ctx.stroke();

  ctx.fillStyle = '#3a5a2a';
  ctx.fillRect(-26, -16, 10, 32);
  ctx.fillRect(16, -16, 10, 32);
  ctx.strokeStyle = '#7ec850';
  ctx.lineWidth = 0.5;
  for (let i = -14; i <= 14; i += 7) {
    ctx.beginPath(); ctx.moveTo(-26, i); ctx.lineTo(-16, i); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(16, i); ctx.lineTo(26, i); ctx.stroke();
  }
  ctx.restore();

  ctx.save();
  ctx.rotate(turretAngle);
  ctx.fillStyle = '#5a5a2a';
  ctx.strokeStyle = '#e0c060';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(0, 0, 11, 0, Math.PI*2);
  ctx.fill(); ctx.stroke();

  ctx.fillStyle = '#e0c060';
  ctx.strokeStyle = '#e0c060';
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(24, 0); ctx.stroke();

  ctx.strokeStyle = '#e05050';
  ctx.lineWidth = 1;
  ctx.setLineDash([4,3]);
  ctx.beginPath(); ctx.moveTo(24, 0); ctx.lineTo(60, 0); ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();

  ctx.restore();
}

function lerpAngle(a, b, t) {
  let diff = ((b - a + Math.PI*3) % (Math.PI*2)) - Math.PI;
  return a + diff * Math.min(1, t);
}

function loop(now) {
  const dt = Math.min((now - last) / 1000, 0.05);
  last = now;

  if (keys['a']) tank.angle -= tank.turnSpeed * dt;
  if (keys['d']) tank.angle += tank.turnSpeed * dt;

  let moved = false;
  if (keys['w']) { tank.x += Math.cos(tank.angle) * tank.speed * dt; tank.y += Math.sin(tank.angle) * tank.speed * dt; moved = true; }
  if (keys['s']) { tank.x -= Math.cos(tank.angle) * tank.speed * dt * 0.6; tank.y -= Math.sin(tank.angle) * tank.speed * dt * 0.6; moved = true; }

  tank.x = Math.max(30, Math.min(W-30, tank.x));
  tank.y = Math.max(30, Math.min(H-30, tank.y));

  if (moved || keys['a'] || keys['d']) {
    if (tank.trail.length === 0 || Math.hypot(tank.x - tank.trail[tank.trail.length-1].x, tank.y - tank.trail[tank.trail.length-1].y) > 8) {
      tank.trail.push({ x: tank.x, y: tank.y, a: tank.angle });
      if (tank.trail.length > 60) tank.trail.shift();
    }
  }

  const targetAngle = Math.atan2(mouseY - tank.y, mouseX - tank.x);
  tank.turretAngle = lerpAngle(tank.turretAngle, targetAngle, tank.turretSpeed * dt);

  ctx.clearRect(0, 0, W, H);

  ctx.fillStyle = '#1a2a1a';
  ctx.fillRect(0, 0, W, H);

  for (let i = 0; i < W; i += 40) {
    ctx.strokeStyle = 'rgba(255,255,255,0.04)';
    ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, H); ctx.stroke();
  }
  for (let j = 0; j < H; j += 40) {
    ctx.beginPath(); ctx.moveTo(0, j); ctx.lineTo(W, j); ctx.stroke();
  }

  if (tank.trail.length > 1) {
    for (let i = 1; i < tank.trail.length; i++) {
      const a = i / tank.trail.length;
      const p = tank.trail[i-1];
      ctx.save();
      ctx.translate(p.x, p.y); ctx.rotate(p.a);
      ctx.strokeStyle = `rgba(100,160,80,${a*0.3})`;
      ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(-24,-12); ctx.lineTo(-24,12); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(24,-12); ctx.lineTo(24,12); ctx.stroke();
      ctx.restore();
    }
  }

  drawTank(tank.x, tank.y, tank.angle, tank.turretAngle);

  const anyKey = keys['w']||keys['a']||keys['s']||keys['d'];
  ctx.fillStyle = anyKey ? '#7ec850' : 'rgba(126,200,80,0.3)';
  ctx.font = '11px monospace';
  ctx.fillText(`hull: ${(tank.angle * 180/Math.PI).toFixed(0)}°  turret: ${(tank.turretAngle * 180/Math.PI).toFixed(0)}°`, 10, H-10);

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
